name: ems_dispatcher
description: EMS Dispatcher Mobile App for Marikina City Emergency Services.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP client
  dio: ^5.7.0

  # Real-time (SignalR)
  signalr_netcore: ^1.3.5

  # Navigation
  go_router: ^14.2.0

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Utilities
  intl: ^0.19.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
